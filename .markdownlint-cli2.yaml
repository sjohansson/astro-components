globs:
  - "**/*.md"
  - "!node_modules"
  - "!**/node_modules"
  - "!**/dist"
  - "!**/coverage"
  - "!.changeset"

config:
  default: true

  # Line length — disabled, Biome handles code formatting
  MD013: false

  # Inline HTML — needed in documentation
  MD033: false

  # Duplicate headings — allow across sibling sections
  MD024:
    siblings_only: true

  # Table column alignment — too pedantic for docs
  MD060: false

  # Trailing punctuation in headings — allow ! and ?
  MD026:
    punctuation: ".,;:"

  # First line heading — not all docs need a top-level heading
  MD041: false
